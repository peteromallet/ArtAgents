schema_version: 1
id: external.runpod.provision
name: RunPod Provision
kind: external
version: 0.1.0
description: Provision a RunPod GPU pod and emit a pod_handle.json artifact. Does not terminate.
short_description: Provision a RunPod GPU pod and emit a pod handle for later exec/teardown.
keywords:
  - runpod
  - gpu
  - provision
  - pod
  - launch
cache:
  mode: none
runtime:
  type: command
  command:
    argv:
      - '{python_exec}'
      - -m
      - astrid.packs.external.executors.runpod.run
      - provision
      - --produces-dir
      - '{out}/produces'
conditions: []
graph:
  consumes: []
  provides:
    - pod_handle
    - cost
inputs:
  - name: gpu_type
    description: GPU type to request (e.g. RTX 4090, A100).
    required: false
    type: string
  - name: storage_name
    description: Name of a pre-existing RunPod network storage volume.
    required: false
    type: string
  - name: max_runtime_seconds
    description: Maximum runtime in seconds before the pod guard triggers.
    required: false
    type: integer
  - name: name_prefix
    description: Name prefix for the pod (used for grouping and sweeper correlation).
    required: false
    type: string
  - name: image
    description: Docker image to run on the pod.
    required: false
    type: string
  - name: container_disk_gb
    description: Container disk size in GB.
    required: false
    type: integer
  - name: datacenter_id
    description: RunPod datacenter ID.
    required: false
    type: string
  - name: ports
    description: "Comma-separated port spec for the pod (default: '8888/http,22/tcp')."
    required: false
    type: string
isolation:
  mode: subprocess
  network: true
  requirements:
    - runpod-lifecycle>=0.3
metadata:
  catalog_source: none_declared
  cli_module: runpod_lifecycle.cli
  command_names:
    - provision
    - exec
    - teardown
    - session
  homepage: https://github.com/peteromallet/runpod-lifecycle
  network_behavior:
    provision: true
    exec: true
    teardown: true
    session: true
  nodes: []
  pack_id: runpod
  prompts: []
  requirements:
    - runpod-lifecycle>=0.3
  requirements_source: requirements.txt
  runtime_file: run.py
  runtime_module: astrid.packs.external.executors.runpod.run
