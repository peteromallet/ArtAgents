{
  "schema_version": 1,
  "cache": {
    "mode": "none"
  },
  "child_executors": [
    "builtin.tile_video",
    "builtin.visual_understand",
    "external.fal_foley",
    "builtin.foley_review",
    "builtin.spatial_audio_page"
  ],
  "child_orchestrators": [],
  "description": "Spatial Foley pipeline: tile a video, ask a VLM for a global scene description and per-tile prompts, score each tile via fal Hunyuan-Foley, render a sense-check page, and emit a static viewer that mixes the tracks by viewport position.",
  "id": "builtin.foley_map",
  "isolation": {
    "mode": "subprocess",
    "network": true
  },
  "keywords": [
    "foley",
    "audio",
    "video",
    "spatial",
    "tile",
    "vlm",
    "viewer"
  ],
  "kind": "external",
  "metadata": {
    "env": [
      "FAL_KEY",
      "OPENAI_API_KEY"
    ],
    "runtime_entrypoint": "main",
    "runtime_file": "run.py",
    "runtime_module": "astrid.packs.builtin.orchestrators.foley_map.run"
  },
  "name": "Foley Map",
  "runtime": {
    "command": {
      "argv": [
        "{python_exec}",
        "-m",
        "astrid.packs.builtin.orchestrators.foley_map.run",
        "{orchestrator_args}"
      ]
    },
    "type": "command"
  },
  "short_description": "Spatial Foley pipeline: tile a video, prompt a VLM, score Foley per tile, and emit a viewer.",
  "version": "0.1"
}
