{
  "cache": {
    "mode": "none"
  },
  "child_executors": [],
  "child_orchestrators": [],
  "description": "Iterative grid editor: take an existing grid image, pick one or more cells as references, and generate a new grid of variations via fal openai/gpt-image-2/edit. Output is itself a grid, ready to be sliced and fed back in for the next iteration.",
  "id": "builtin.vary_grid",
  "isolation": {
    "mode": "subprocess",
    "network": true
  },
  "keywords": [
    "fal",
    "image",
    "grid",
    "edit",
    "vary",
    "iterate",
    "gpt-image"
  ],
  "kind": "built_in",
  "metadata": {
    "env": [
      "FIREWORKS_API_KEY",
      "FAL_KEY"
    ],
    "runtime_entrypoint": "main",
    "runtime_file": "run.py",
    "runtime_module": "astrid.packs.builtin.orchestrators.vary_grid.run"
  },
  "name": "Vary Grid",
  "runtime": {
    "command": {
      "argv": [
        "{python_exec}",
        "-m",
        "astrid.packs.builtin.orchestrators.vary_grid.run",
        "{orchestrator_args}"
      ]
    },
    "kind": "command"
  },
  "short_description": "Iterative grid editor: take an existing grid image and emit a new grid of variations via fal.",
  "version": "1.0"
}
