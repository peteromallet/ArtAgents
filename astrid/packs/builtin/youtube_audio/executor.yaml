{
  "id": "builtin.youtube_audio",
  "name": "YouTube Audio",
  "kind": "built_in",
  "version": "0.1.0",
  "short_description": "Download a YouTube video's audio (MP3) or video (MP4) — by search query or direct URL.",
  "description": "Wraps yt-dlp to fetch a YouTube result by free-text search (top hit) or direct URL, in either audio-extraction mode (MP3) or raw-video mode (MP4). Useful for sourcing background tracks for composites OR for ingesting video files into dataset pipelines.",
  "keywords": ["youtube", "audio", "video", "download", "yt-dlp", "mp3", "mp4", "music", "search"],
  "inputs": [
    {
      "name": "query",
      "type": "string",
      "required": false,
      "description": "Free-text YouTube search query (top hit is used). Mutually exclusive with url."
    },
    {
      "name": "url",
      "type": "string",
      "required": false,
      "description": "Direct YouTube URL. Mutually exclusive with query."
    },
    {
      "name": "mode",
      "type": "string",
      "required": false,
      "description": "'audio' (default — extract to MP3) or 'video' (download MP4 without audio extraction)."
    }
  ],
  "outputs": [
    {
      "name": "audio",
      "type": "file",
      "placeholder": "output",
      "description": "MP3 audio extracted from the top YouTube result.",
      "mode": "create_or_replace"
    }
  ],
  "graph": {
    "consumes": [],
    "depends_on": [],
    "provides": ["audio"]
  },
  "isolation": {
    "mode": "subprocess",
    "network": true,
    "binaries": ["yt-dlp", "ffmpeg"],
    "requirements": []
  },
  "cache": {
    "mode": "none"
  },
  "conditions": [
    {
      "kind": "requires_input",
      "input": "query"
    }
  ],
  "command": {
    "argv": [
      "{python_exec}",
      "-m",
      "astrid.packs.builtin.youtube_audio.run",
      "--query",
      "{query}",
      "--mode",
      "{mode}",
      "--out",
      "{output}"
    ]
  }
}
