{
  "id": "builtin.youtube_audio",
  "name": "YouTube Audio",
  "kind": "built_in",
  "version": "0.1.0",
  "short_description": "Search YouTube for a query and download the top hit's audio as MP3 via yt-dlp.",
  "description": "Wraps yt-dlp's ytsearch1: selector and --extract-audio to fetch the best-matching YouTube result for a free-text query and write its audio as a standalone MP3 file. Useful for sourcing background tracks for video composites without leaving the Astrid CLI.",
  "keywords": ["youtube", "audio", "download", "yt-dlp", "mp3", "music", "search"],
  "inputs": [
    {
      "name": "query",
      "type": "string",
      "required": true,
      "description": "Free-text YouTube search query. The top result's audio is downloaded."
    }
  ],
  "outputs": [
    {
      "name": "audio",
      "type": "file",
      "placeholder": "output",
      "description": "MP3 audio extracted from the top YouTube result.",
      "mode": "create_or_replace"
    }
  ],
  "graph": {
    "consumes": [],
    "depends_on": [],
    "provides": ["audio"]
  },
  "isolation": {
    "mode": "subprocess",
    "network": true,
    "binaries": ["yt-dlp", "ffmpeg"],
    "requirements": []
  },
  "cache": {
    "mode": "none"
  },
  "conditions": [
    {
      "kind": "requires_input",
      "input": "query"
    }
  ],
  "command": {
    "argv": [
      "{python_exec}",
      "-m",
      "astrid.packs.builtin.youtube_audio.run",
      "--query",
      "{query}",
      "--out",
      "{output}"
    ]
  }
}
