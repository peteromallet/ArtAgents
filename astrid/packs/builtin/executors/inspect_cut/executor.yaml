{
  "schema_version": 1,
  "cache": {
    "mode": "none"
  },
  "description": "Inspect a generated cut run directory.",
  "id": "builtin.inspect_cut",
  "inputs": [
    {
      "description": "Cut run directory to inspect.",
      "name": "run_dir",
      "type": "directory"
    }
  ],
  "isolation": {
    "mode": "subprocess"
  },
  "keywords": [
    "cut",
    "inspect",
    "video",
    "timeline",
    "debug",
    "report"
  ],
  "kind": "external",
  "metadata": {
    "runtime_file": "run.py",
    "runtime_module": "astrid.packs.builtin.executors.inspect_cut.run"
  },
  "name": "Inspect Cut",
  "runtime": {
    "command": {
      "argv": [
        "{python_exec}",
        "-m",
        "astrid.packs.builtin.executors.inspect_cut.run",
        "{run_dir}"
      ]
    },
    "type": "command"
  },
  "short_description": "Inspect a generated cut run directory and report timeline/asset health.",
  "version": "1.0"
}
