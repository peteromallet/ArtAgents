{
  "id": "builtin.human_review",
  "name": "Human Review",
  "kind": "built_in",
  "version": "1.0",
  "short_description": "Serve a small HTML page locally, collect human decisions as JSON, block until submit.",
  "description": "Generic human-gate primitive. Spins up a localhost HTTP server, serves a project-supplied --html page, exposes --data as /data.json (read-only), accepts POST /save (partial state, per keypress) and POST /submit (final, schema-validated, server exits 0). Reusable by any orchestrator that needs a human in the loop — dataset review, eval-grid pick, arrangement approval. Token-authenticated POSTs.",
  "keywords": ["human", "review", "gate", "browser", "form", "annotate", "attested"],
  "inputs": [
    {"name": "html", "type": "file", "required": true, "description": "Path to the page to serve as /. May be a single .html file or a directory served statically."},
    {"name": "data", "type": "file", "required": true, "description": "JSON file served read-only at /data.json."},
    {"name": "serve", "type": "string", "required": false, "description": "Repeatable static mount as <prefix>=<dir> (e.g. /clips=runs/x/accepted)."},
    {"name": "state", "type": "file", "required": false, "description": "Partial-state path. POST /save writes here per keystroke; GET /state.json returns contents or 404."},
    {"name": "out", "type": "file", "required": true, "description": "Output path. POST /submit writes the validated body here and the server exits 0."},
    {"name": "response_schema", "type": "file", "required": false, "description": "Optional JSON schema validating /submit bodies (jsonschema strict mode)."},
    {"name": "port", "type": "integer", "required": false, "description": "Explicit port, or 0 for auto-pick. Default 0."},
    {"name": "no_open", "type": "boolean", "required": false, "description": "Skip auto-launching the browser. Default false."},
    {"name": "timeout", "type": "integer", "required": false, "description": "Exit nonzero if no /submit by this many seconds. 0 = unlimited."}
  ],
  "outputs": [
    {"name": "decisions", "type": "file", "description": "Validated submit body."}
  ],
  "isolation": {"mode": "subprocess", "network": false},
  "cache": {"mode": "none"},
  "command": {
    "argv": [
      "{python_exec}",
      "-m",
      "astrid.packs.builtin.executors.human_review.run",
      "--html",
      "{html}",
      "--data",
      "{data}",
      "--out",
      "{out}"
    ]
  },
  "metadata": {
    "runtime_module": "astrid.packs.builtin.executors.human_review.run",
    "runtime_file": "run.py"
  }
}
