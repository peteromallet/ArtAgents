{
  "schema_version": 1,
  "cache": {
    "mode": "none"
  },
  "description": "Generic human-gate primitive. Spins up a localhost HTTP server, serves a project-supplied --html page, exposes --data as /data.json (read-only), accepts POST /save (partial state, per keypress) and POST /submit (final, schema-validated, server exits 0). Reusable by any orchestrator that needs a human in the loop \u2014 dataset review, eval-grid pick, arrangement approval. Token-authenticated POSTs.",
  "id": "builtin.human_review",
  "inputs": [
    {
      "description": "Path to the page to serve as /. May be a single .html file or a directory served statically.",
      "name": "html",
      "required": true,
      "type": "file"
    },
    {
      "description": "JSON file served read-only at /data.json.",
      "name": "data",
      "required": true,
      "type": "file"
    },
    {
      "description": "Repeatable static mount as <prefix>=<dir> (e.g. /clips=runs/x/accepted).",
      "name": "serve",
      "required": false,
      "type": "string"
    },
    {
      "description": "Partial-state path. POST /save writes here per keystroke; GET /state.json returns contents or 404.",
      "name": "state",
      "required": false,
      "type": "file"
    },
    {
      "description": "Output path. POST /submit writes the validated body here and the server exits 0.",
      "name": "out",
      "required": true,
      "type": "file"
    },
    {
      "description": "Optional JSON schema validating /submit bodies (jsonschema strict mode).",
      "name": "response_schema",
      "required": false,
      "type": "file"
    },
    {
      "description": "Explicit port, or 0 for auto-pick. Default 0.",
      "name": "port",
      "required": false,
      "type": "integer"
    },
    {
      "description": "Skip auto-launching the browser. Default false.",
      "name": "no_open",
      "required": false,
      "type": "boolean"
    },
    {
      "description": "Exit nonzero if no /submit by this many seconds. 0 = unlimited.",
      "name": "timeout",
      "required": false,
      "type": "integer"
    }
  ],
  "isolation": {
    "mode": "subprocess",
    "network": false
  },
  "keywords": [
    "human",
    "review",
    "gate",
    "browser",
    "form",
    "annotate",
    "attested"
  ],
  "kind": "external",
  "metadata": {
    "runtime_file": "run.py",
    "runtime_module": "astrid.packs.builtin.executors.human_review.run"
  },
  "name": "Human Review",
  "outputs": [
    {
      "description": "Validated submit body.",
      "name": "decisions",
      "type": "file"
    }
  ],
  "runtime": {
    "command": {
      "argv": [
        "{python_exec}",
        "-m",
        "astrid.packs.builtin.executors.human_review.run",
        "--html",
        "{html}",
        "--data",
        "{data}",
        "--out",
        "{out}"
      ]
    },
    "type": "command"
  },
  "short_description": "Serve a small HTML page locally, collect human decisions as JSON, block until submit.",
  "version": "1.0"
}
