{
  "schema_version": 1,
  "cache": {
    "mode": "none"
  },
  "description": "Build a static review.html that pairs each tile clip with its generated Foley audio for sense-checking. Reviewers can flag bad tiles; flags are written to a flagged.json sidecar.",
  "id": "builtin.foley_review",
  "inputs": [
    {
      "description": "tiles.json manifest (with foley_audio paths added).",
      "name": "manifest",
      "required": true,
      "type": "file"
    }
  ],
  "isolation": {
    "mode": "subprocess",
    "network": false
  },
  "keywords": [
    "foley",
    "audio",
    "review",
    "video",
    "html",
    "tiles"
  ],
  "kind": "external",
  "metadata": {
    "runtime_entrypoint": "main",
    "runtime_file": "run.py",
    "runtime_module": "astrid.packs.builtin.executors.foley_review.run"
  },
  "name": "Foley Review",
  "outputs": [
    {
      "name": "review_html",
      "path_template": "{out}/review.html",
      "type": "file"
    }
  ],
  "runtime": {
    "command": {
      "argv": [
        "{python_exec}",
        "-m",
        "astrid.packs.builtin.executors.foley_review.run",
        "--manifest",
        "{manifest}",
        "--out",
        "{out}"
      ]
    },
    "type": "command"
  },
  "short_description": "Build a static review.html pairing each tile clip with its generated Foley audio for sense-checking.",
  "version": "1.0"
}
