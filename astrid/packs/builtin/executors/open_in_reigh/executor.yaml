{
  "schema_version": 1,
  "cache": {
    "mode": "none"
  },
  "description": "Copy or prepare generated timeline/assets for Reigh handoff.",
  "id": "builtin.open_in_reigh",
  "inputs": [
    {
      "description": "Timeline JSON.",
      "name": "timeline",
      "type": "file"
    },
    {
      "description": "Assets JSON.",
      "name": "assets",
      "required": false,
      "type": "file"
    },
    {
      "description": "Timeline id to open in Reigh.",
      "name": "timeline_id",
      "required": true,
      "type": "string"
    }
  ],
  "isolation": {
    "mode": "subprocess"
  },
  "keywords": [
    "reigh",
    "handoff",
    "timeline",
    "assets",
    "copy",
    "stage"
  ],
  "kind": "external",
  "metadata": {
    "runtime_file": "run.py",
    "runtime_module": "astrid.packs.builtin.executors.open_in_reigh.run"
  },
  "name": "Open In Reigh",
  "runtime": {
    "command": {
      "argv": [
        "{python_exec}",
        "-m",
        "astrid.packs.builtin.executors.open_in_reigh.run",
        "--out",
        "{out}",
        "--timeline-id",
        "{timeline_id}"
      ]
    },
    "type": "command"
  },
  "short_description": "Copy or stage generated timeline+assets for handoff into a Reigh project.",
  "version": "1.0"
}
