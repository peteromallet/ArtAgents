{
  "schema_version": 1,
  "cache": {
    "mode": "none"
  },
  "description": "Manage the repo-local hype asset cache.",
  "id": "builtin.asset_cache",
  "inputs": [
    {
      "description": "Remove cache entries older than this many days.",
      "name": "prune_older_than",
      "type": "number"
    },
    {
      "default": 30,
      "description": "Remove cache entries older than this many days.",
      "name": "prune_days",
      "required": false,
      "type": "integer"
    }
  ],
  "isolation": {
    "mode": "subprocess"
  },
  "keywords": [
    "cache",
    "assets",
    "video",
    "audio",
    "hype",
    "manage"
  ],
  "kind": "external",
  "metadata": {
    "runtime_file": "run.py",
    "runtime_module": "astrid.packs.builtin.executors.asset_cache.run"
  },
  "name": "Asset Cache",
  "runtime": {
    "command": {
      "argv": [
        "{python_exec}",
        "-m",
        "astrid.packs.builtin.executors.asset_cache.run",
        "--prune-older-than",
        "{prune_days}"
      ]
    },
    "type": "command"
  },
  "short_description": "Manage the repo-local hype asset cache (download, prune, list).",
  "version": "1.0"
}
