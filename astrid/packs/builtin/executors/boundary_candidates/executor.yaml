{
  "schema_version": 1,
  "cache": {
    "mode": "none"
  },
  "description": "Package candidate video frames for visual boundary review.",
  "id": "builtin.boundary_candidates",
  "inputs": [
    {
      "description": "Source video.",
      "name": "video",
      "type": "file"
    },
    {
      "description": "Boundary manifest input.",
      "name": "manifest",
      "type": "file"
    }
  ],
  "isolation": {
    "mode": "subprocess"
  },
  "keywords": [
    "video",
    "scenes",
    "boundary",
    "frames",
    "analyze",
    "review"
  ],
  "kind": "external",
  "metadata": {
    "runtime_file": "run.py",
    "runtime_module": "astrid.packs.builtin.executors.boundary_candidates.run"
  },
  "name": "Boundary Candidates",
  "outputs": [
    {
      "name": "boundaries",
      "path_template": "{out}/boundary_candidates.json",
      "type": "file"
    }
  ],
  "runtime": {
    "command": {
      "argv": [
        "{python_exec}",
        "-m",
        "astrid.packs.builtin.executors.boundary_candidates.run",
        "--video",
        "{video}",
        "--manifest",
        "{manifest}",
        "--out",
        "{out}"
      ]
    },
    "type": "command"
  },
  "short_description": "Package candidate video frames for visual scene-boundary review.",
  "version": "1.0"
}
