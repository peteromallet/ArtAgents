{
  "schema_version": 1,
  "cache": {
    "mode": "none"
  },
  "description": "Inspect images or sampled video frames with an OpenAI vision model. Free-text queries or JSON-schema-constrained structured output for vocabulary-locked enums.",
  "id": "builtin.visual_understand",
  "inputs": [
    {
      "description": "Image to inspect.",
      "name": "image",
      "required": false,
      "type": "file"
    },
    {
      "description": "Query or rubric to ask the visual model.",
      "name": "query",
      "required": true,
      "type": "string"
    }
  ],
  "isolation": {
    "mode": "subprocess"
  },
  "keywords": [
    "vision",
    "image",
    "video",
    "understand",
    "llm",
    "describe",
    "json_schema",
    "structured_output",
    "vocabulary"
  ],
  "kind": "external",
  "metadata": {
    "runtime_entrypoint": "main",
    "runtime_file": "run.py",
    "runtime_module": "astrid.packs.builtin.executors.visual_understand.run"
  },
  "name": "Visual Understand",
  "runtime": {
    "command": {
      "argv": [
        "{python_exec}",
        "-m",
        "astrid.packs.builtin.executors.visual_understand.run",
        "--query",
        "{query}"
      ]
    },
    "type": "command"
  },
  "short_description": "Inspect images or sampled video frames with a vision LLM \u2014 free-text or JSON-schema-constrained.",
  "version": "1.0"
}
