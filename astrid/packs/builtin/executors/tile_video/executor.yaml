{
  "schema_version": 1,
  "cache": {
    "mode": "none"
  },
  "description": "Crop a video into an MxN grid of overlapping spatial tiles. Emits one tile clip and one first-frame PNG per tile, plus a tiles.json manifest with each tile's rect in original-video coords.",
  "id": "builtin.tile_video",
  "inputs": [
    {
      "description": "Source video to tile.",
      "name": "video",
      "required": true,
      "type": "file"
    }
  ],
  "isolation": {
    "mode": "subprocess",
    "network": false
  },
  "keywords": [
    "video",
    "tile",
    "ffmpeg",
    "spatial",
    "grid",
    "frames"
  ],
  "kind": "external",
  "metadata": {
    "runtime_entrypoint": "main",
    "runtime_file": "run.py",
    "runtime_module": "astrid.packs.builtin.executors.tile_video.run"
  },
  "name": "Tile Video",
  "outputs": [
    {
      "name": "tiles_manifest",
      "path_template": "{out}/tiles.json",
      "type": "file"
    }
  ],
  "runtime": {
    "command": {
      "argv": [
        "{python_exec}",
        "-m",
        "astrid.packs.builtin.executors.tile_video.run",
        "--video",
        "{video}",
        "--out",
        "{out}"
      ]
    },
    "type": "command"
  },
  "short_description": "Crop a video into an MxN grid of overlapping spatial tiles plus first-frame PNGs.",
  "version": "1.0"
}
