{
  "schema_version": 1,
  "cache": {
    "mode": "none"
  },
  "conditions": [
    {
      "input": "query",
      "kind": "requires_input"
    }
  ],
  "description": "Wraps yt-dlp to fetch a YouTube result by free-text search (top hit) or direct URL, in either audio-extraction mode (MP3) or raw-video mode (MP4). Useful for sourcing background tracks for composites OR for ingesting video files into dataset pipelines.",
  "graph": {
    "consumes": [],
    "depends_on": [],
    "provides": [
      "audio"
    ]
  },
  "id": "builtin.youtube_audio",
  "inputs": [
    {
      "description": "Free-text YouTube search query (top hit is used). Mutually exclusive with url.",
      "name": "query",
      "required": false,
      "type": "string"
    },
    {
      "description": "Direct YouTube URL. Mutually exclusive with query.",
      "name": "url",
      "required": false,
      "type": "string"
    },
    {
      "description": "'audio' (default \u2014 extract to MP3) or 'video' (download MP4 without audio extraction).",
      "name": "mode",
      "required": false,
      "type": "string"
    },
    {
      "description": "Destination path for the downloaded audio file.",
      "name": "out_path",
      "required": true,
      "type": "file"
    }
  ],
  "isolation": {
    "binaries": [
      "yt-dlp",
      "ffmpeg"
    ],
    "mode": "subprocess",
    "network": true,
    "requirements": []
  },
  "keywords": [
    "youtube",
    "audio",
    "video",
    "download",
    "yt-dlp",
    "mp3",
    "mp4",
    "music",
    "search"
  ],
  "kind": "external",
  "name": "YouTube Audio",
  "outputs": [
    {
      "description": "MP3 audio extracted from the top YouTube result.",
      "mode": "create_or_replace",
      "name": "audio",
      "placeholder": "output",
      "type": "file"
    }
  ],
  "runtime": {
    "command": {
      "argv": [
        "{python_exec}",
        "-m",
        "astrid.packs.builtin.executors.youtube_audio.run",
        "--out",
        "{out_path}"
      ]
    },
    "type": "command"
  },
  "short_description": "Download a YouTube video's audio (MP3) or video (MP4) \u2014 by search query or direct URL.",
  "version": "0.1.0"
}
