{
  "cache": {
    "mode": "none"
  },
  "command": {
    "argv": [
      "{python_exec}",
      "-m",
      "astrid.packs.builtin.executors.understand.run",
      "--mode",
      "{mode}"
    ]
  },
  "description": "Dispatch to the audio, visual, or video understanding executor based on --mode.",
  "id": "builtin.understand",
  "inputs": [
    {
      "description": "Understanding modality: audio | image | visual | video. Determines which underlying executor receives the call.",
      "name": "mode",
      "required": true,
      "type": "string"
    }
  ],
  "isolation": {
    "mode": "subprocess"
  },
  "keywords": [
    "understand",
    "dispatch",
    "audio",
    "video",
    "image",
    "llm"
  ],
  "kind": "built_in",
  "metadata": {
    "runtime_entrypoint": "main",
    "runtime_file": "run.py",
    "runtime_module": "astrid.packs.builtin.executors.understand.run"
  },
  "name": "Understand",
  "short_description": "Dispatch to the audio, visual, or video understanding executor based on --mode.",
  "version": "1.0"
}
