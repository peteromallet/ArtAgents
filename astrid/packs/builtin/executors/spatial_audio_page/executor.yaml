{
  "cache": {
    "mode": "none"
  },
  "command": {
    "argv": [
      "{python_exec}",
      "-m",
      "astrid.packs.builtin.executors.spatial_audio_page.run"
    ]
  },
  "description": "Build a static page that plays the original video with N Foley tracks anchored to spatial rectangles, mixed live by viewport position via Web Audio. Output is a self-contained directory of HTML + asset copies.",
  "id": "builtin.spatial_audio_page",
  "inputs": [
    {
      "description": "tiles.json manifest (with foley_audio paths).",
      "name": "manifest",
      "required": true,
      "type": "file"
    }
  ],
  "isolation": {
    "mode": "subprocess",
    "network": false
  },
  "keywords": [
    "foley",
    "audio",
    "spatial",
    "html",
    "video",
    "web-audio",
    "page"
  ],
  "kind": "built_in",
  "metadata": {
    "runtime_entrypoint": "main",
    "runtime_file": "run.py",
    "runtime_module": "astrid.packs.builtin.executors.spatial_audio_page.run"
  },
  "name": "Spatial Audio Page",
  "outputs": [
    {
      "name": "page",
      "path_template": "{out}",
      "type": "directory"
    }
  ],
  "short_description": "Build a static page that mixes Foley tracks anchored to spatial rectangles via Web Audio.",
  "version": "1.0"
}
