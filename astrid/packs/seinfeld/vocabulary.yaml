# Seinfeld locked vocabulary — PLACEHOLDER, to be filled in Phase 0.
#
# This file is the SPINE of the whole project. Captions, scripts, and
# inference prompts all reference these enums. Keep it small, formulaic,
# Seinfeld-shaped. If you can't render it, don't list it.
#
# Phase 0 process:
#   1. Write ~10 example inference prompts you want to work in the final demo.
#   2. Reverse-engineer the enums below from those prompts — every value here
#      should appear in at least one of those prompts.
#   3. Pin the caption template so VLM-written captions emit ONLY these tokens.

version: 0.0.0-draft

scenes:
  # id: short_description (what camera + setting the model should produce)
  jerrys_apt: "Jerry's apartment — kitchen + living room, big window, beige cabinets, exposed brick"
  monks_diner: "Monk's coffee shop booth — formica table, vinyl seats, diner counter visible behind"
  # TODO: pick a third (street outside building? bedroom? car? hallway?)

characters:
  jerry:
    description: "Mid-30s male, short dark hair, button-down + jeans + white sneakers"
    outfits: ["jeans_buttondown", "sweater_jeans"]
  george:
    description: "Short stocky man, balding, glasses, often anxious"
    outfits: ["polo_chinos", "windbreaker"]
  elaine:
    description: "Mid-30s woman, curly dark hair, business-casual blazer or dress"
    outfits: ["blazer_pants", "floral_dress"]
  kramer:
    description: "Tall lanky man, wild hair, vintage shirts, dramatic entrances"
    outfits: ["vintage_shirt_pants"]

shot_types:
  wide: "Wide framing showing full setting + 1–4 characters"
  medium: "Medium two-shot or single, waist-up"
  closeup: "Close-up on one character's face/expression"
  reaction: "Reaction shot — close on listening character"

# Caption template — VLM must produce captions of this exact shape.
# Vocabulary-locked: scene MUST be in scenes; character MUST be in characters;
# outfit MUST be in that character's outfits; shot_type MUST be in shot_types.
caption_template: |
  A {shot_type} shot in {scene}. {characters_clause}. {action_clause}.
  Seinfeld sitcom style, 90s NBC sitcom lighting, multi-cam look.

# Where {characters_clause} reads like:
#   "Jerry in jeans_buttondown and George in polo_chinos"
# and {action_clause} is a short free-text action (the only un-locked part).
