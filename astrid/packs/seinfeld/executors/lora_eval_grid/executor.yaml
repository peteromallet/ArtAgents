{
  "schema_version": 1,
  "id": "seinfeld.lora_eval_grid",
  "name": "Seinfeld LoRA Eval Grid",
  "kind": "external",
  "version": "0.1.0",
  "short_description": "Run baseline LTX + per-checkpoint inference samples, download MP4s, write static index.html viewer.",
  "description": "Builds 3-6 prompts from the vocabulary, runs baseline LTX (no LoRA) plus inference for each checkpoint listed in checkpoint_manifest.json on the live pod via external.runpod.exec, downloads MP4s into eval_grid/{baseline,<step>}/, emits eval_grid/index.html. --smoke produces 3 baseline-only samples.",
  "keywords": ["seinfeld", "lora", "eval", "grid", "ltx"],
  "inputs": [
    {"name": "pod_handle", "type": "file"},
    {"name": "checkpoint_manifest", "type": "file"},
    {"name": "vocabulary", "type": "file"}
  ],
  "outputs": [
    {"name": "eval_grid_index", "type": "file", "path_template": "{out}/produces/eval_grid/index.html"}
  ],
  "runtime": {
    "type": "command",
    "command": {
      "argv": [
        "{python_exec}",
        "-m",
        "astrid.packs.seinfeld.executors.lora_eval_grid.run",
        "--pod-handle", "{pod_handle}",
        "--checkpoint-manifest", "{checkpoint_manifest}",
        "--vocabulary", "{vocabulary}",
        "--produces-dir", "{out}/produces"
      ]
    }
  },
  "cache": {"mode": "none"},
  "isolation": {"mode": "subprocess", "network": true},
  "metadata": {
    "runtime_module": "astrid.packs.seinfeld.executors.lora_eval_grid.run",
    "runtime_file": "run.py"
  }
}
