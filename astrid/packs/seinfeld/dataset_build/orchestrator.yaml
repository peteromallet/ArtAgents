{
  "id": "seinfeld.dataset_build",
  "name": "Seinfeld Dataset Build",
  "kind": "built_in",
  "version": "0.1.0",
  "short_description": "Bucket-fill loop that builds the Seinfeld LoRA training set from YouTube.",
  "description": "Reads the locked-vocabulary criteria element, searches YouTube, downloads video, segments scenes, VLM-judges each clip into a vocabulary bucket, VLM-captions it against the locked template, human-reviews a sample, exports the training manifest. Runs until per-bucket targets are met.",
  "keywords": ["seinfeld", "dataset", "lora", "training", "youtube", "vlm", "captioning"],
  "runtime": {
    "kind": "command",
    "command": {
      "argv": [
        "{python_exec}",
        "-m",
        "astrid.packs.seinfeld.dataset_build.run",
        "{orchestrator_args}"
      ]
    }
  },
  "child_executors": [
    "builtin.youtube_audio",
    "builtin.scenes",
    "builtin.visual_understand",
    "builtin.video_understand"
  ],
  "child_orchestrators": [],
  "cache": {
    "mode": "none"
  },
  "metadata": {
    "runtime_module": "astrid.packs.seinfeld.dataset_build.run",
    "runtime_file": "run.py"
  }
}
