# Chained megaplan setup for Git-backed Astrid packs.
# Prepared only. Do not start until the setup branch is reviewed.

merge_policy: review

driver:
  robustness: standard
  auto_approve: true
  on_escalate: abort

on_failure:
  abort: stop_chain

on_escalate:
  abort: stop_chain

# Provider-routing shim:
# Keep the normal rubric profiles, but route DeepSeek phases through the direct
# DeepSeek API instead of Fireworks. This is deliberately local to this chain so
# we do not multiply project profiles.
x_direct_deepseek_phases: &direct_deepseek_phases
  - prep=hermes:deepseek:deepseek-v4-pro
  - gate=hermes:deepseek:deepseek-v4-pro
  - finalize=hermes:deepseek:deepseek-v4-pro
  - execute=hermes:deepseek:deepseek-v4-pro
  - loop_execute=hermes:deepseek:deepseek-v4-pro

milestones:
  - label: sprint-00-architecture-gate
    idea: docs/megaplan/git-backed-packs/ideas/sprint-00-architecture-gate.md
    branch: megaplan/git-backed-packs/sprint-00-architecture-gate
    profile: premium
    robustness: standard

  - label: sprint-01-contract-validation
    idea: docs/megaplan/git-backed-packs/ideas/sprint-01-contract-validation.md
    branch: megaplan/git-backed-packs/sprint-01-contract-validation
    profile: premium
    robustness: standard

  - label: sprint-02-resolver-runtime
    idea: docs/megaplan/git-backed-packs/ideas/sprint-02-resolver-runtime.md
    branch: megaplan/git-backed-packs/sprint-02-resolver-runtime
    profile: thoughtful
    robustness: standard
    phase_model: *direct_deepseek_phases

