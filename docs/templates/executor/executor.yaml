{
  "id": "builtin.example",
  "name": "Example",
  "kind": "built_in",
  "version": "1.0",
  "short_description": "One-sentence verb-first capability summary (≤120 chars).",
  "description": "Longer description of the concrete unit of work this executor performs (≤500 chars).",
  "keywords": ["example", "verb", "modality"],
  "inputs": [
    {
      "name": "input",
      "type": "file",
      "description": "Input artifact."
    }
  ],
  "outputs": [
    {
      "name": "result",
      "type": "file",
      "path_template": "{out}/result.json"
    }
  ],
  "command": {
    "argv": [
      "{python_exec}",
      "-m",
      "astrid.packs.builtin.example.run",
      "--input",
      "{input}",
      "--out",
      "{out}/result.json"
    ]
  },
  "cache": {
    "mode": "none"
  },
  "isolation": {
    "mode": "subprocess",
    "network": false
  },
  "metadata": {
    "runtime_module": "astrid.packs.builtin.example.run",
    "runtime_file": "run.py"
  }
}
