<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">ArtAgents orchestration on top of agents</title>
  <desc id="desc">A conductor layer receives user goals and routes work to specialized player nodes that can be chained into pipelines or run independently.</desc>
  <defs>
    <style>
      .bg { fill: #fffdf8; }
      .ink { fill: #111827; font-family: ui-rounded, "SF Pro Rounded", "Comic Sans MS", system-ui, sans-serif; }
      .muted { fill: #4b5563; }
      .purple { fill: #312e81; }
      .blue { fill: #1d4ed8; }
      .box { fill: #ffffff; stroke: #4338ca; stroke-width: 2.5; rx: 16; }
      .node { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 14; }
      .dash { fill: none; stroke: #7c3aed; stroke-width: 2; stroke-dasharray: 10 9; rx: 16; }
      .line { fill: none; stroke: #4338ca; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .blueLine { fill: none; stroke: #2563eb; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .small { font-size: 20px; }
      .body { font-size: 23px; }
      .label { font-size: 26px; font-weight: 700; }
      .title { font-size: 46px; font-weight: 800; }
    </style>
    <marker id="arrowPurple" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12" fill="none" stroke="#4338ca" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect class="bg" width="1400" height="780"/>
  <text class="ink title" x="700" y="55" text-anchor="middle">ArtAgents: orchestration on top of agents</text>
  <text class="ink body" x="700" y="93" text-anchor="middle">You speak to your agent as the entry point.</text>
  <text class="ink body" x="700" y="126" text-anchor="middle">It farms your task out to the right players based on requirements, existing nodes, and what it can build.</text>

  <text class="purple label" x="112" y="219" text-anchor="middle">Layer 1</text>
  <text class="purple body" x="112" y="251" text-anchor="middle">Conductors</text>
  <text class="purple small" x="112" y="279" text-anchor="middle">orchestrate</text>

  <path class="line" d="M132 333 C132 300 178 300 178 333 C178 363 132 363 132 333 M155 363 L155 430 M123 430 L187 430"/>
  <text class="purple small" x="155" y="467" text-anchor="middle">You</text>
  <rect class="box" x="206" y="168" width="170" height="104" rx="16"/>
  <text class="ink small" x="291" y="205" text-anchor="middle">Hey, create a</text>
  <text class="ink small" x="291" y="236" text-anchor="middle">60s Instagram reel</text>
  <text class="ink small" x="291" y="266" text-anchor="middle">from this product.</text>
  <path class="line" marker-end="url(#arrowPurple)" d="M378 254 L466 254"/>

  <rect class="box" x="470" y="166" width="560" height="236" rx="18"/>
  <text class="purple label" x="750" y="203" text-anchor="middle">Layer 1: Conductors</text>
  <text class="purple body" x="510" y="245">ArtAgents Orchestrator</text>
  <text class="ink small" x="510" y="281">- understands your goal</text>
  <text class="ink small" x="510" y="310">- plans the approach</text>
  <text class="ink small" x="510" y="339">- selects the right players</text>
  <text class="ink small" x="510" y="368">- sequences, routes, evaluates, retries</text>

  <circle cx="725" cy="300" r="36" fill="#fff" stroke="#111827" stroke-width="3"/>
  <circle cx="711" cy="294" r="5" fill="#111827"/>
  <circle cx="739" cy="294" r="5" fill="#111827"/>
  <path d="M710 315 Q725 328 740 315" fill="none" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
  <path d="M725 264 L725 238 M725 238 L725 226" stroke="#111827" stroke-width="3" stroke-linecap="round"/>
  <circle cx="725" cy="222" r="6" fill="#fff" stroke="#111827" stroke-width="3"/>
  <path class="line" marker-end="url(#arrowPurple)" d="M642 300 L678 300"/>
  <path class="line" marker-end="url(#arrowPurple)" d="M830 300 L786 300"/>
  <text class="ink small" x="880" y="262" text-anchor="middle">Uses what exists</text>
  <text class="ink small" x="880" y="292" text-anchor="middle">and builds what</text>
  <text class="ink small" x="880" y="322" text-anchor="middle">is missing.</text>
  <rect x="922" y="247" width="86" height="100" fill="#ecfdf5" stroke="#166534" stroke-width="2"/>
  <text class="ink small" x="965" y="282" text-anchor="middle">Task</text>
  <text class="ink small" x="965" y="312" text-anchor="middle">complete</text>
  <path class="line" marker-end="url(#arrowPurple)" d="M1030 292 L1085 292"/>

  <rect class="dash" x="1088" y="142" width="240" height="268" rx="18"/>
  <text class="purple small" x="1208" y="177" text-anchor="middle">Examples of conductors</text>
  <text class="ink small" x="1130" y="226">LLM video director</text>
  <text class="muted small" x="1130" y="255">build, pick, refine</text>
  <text class="ink small" x="1130" y="305">Creative pipeline</text>
  <text class="muted small" x="1130" y="334">ideate, generate, compose</text>
  <text class="ink small" x="1130" y="384">Resize utility</text>

  <text class="blue label" x="112" y="535" text-anchor="middle">Layer 2</text>
  <text class="blue body" x="112" y="567" text-anchor="middle">Players</text>
  <text class="blue small" x="112" y="596" text-anchor="middle">execute</text>

  <text class="purple body" x="700" y="440" text-anchor="middle">Conductors farm work out to players...</text>
  <path class="line" marker-end="url(#arrowPurple)" d="M550 415 L310 488"/>
  <path class="line" marker-end="url(#arrowPurple)" d="M640 415 L500 488"/>
  <path class="line" marker-end="url(#arrowPurple)" d="M725 415 L690 488"/>
  <path class="line" marker-end="url(#arrowPurple)" d="M810 415 L885 488"/>
  <path class="line" marker-end="url(#arrowPurple)" d="M902 415 L1075 488"/>

  <g>
    <rect class="node" x="185" y="493" width="150" height="145"/>
    <text class="ink small" x="260" y="529" text-anchor="middle">Image Editing</text>
    <text class="muted small" x="260" y="562" text-anchor="middle">inpaint, remove,</text>
    <text class="muted small" x="260" y="589" text-anchor="middle">style, upscale</text>
  </g>
  <g>
    <rect class="node" x="365" y="493" width="150" height="145"/>
    <text class="ink small" x="440" y="529" text-anchor="middle">Video Understanding</text>
    <text class="muted small" x="440" y="562" text-anchor="middle">describe, detect,</text>
    <text class="muted small" x="440" y="589" text-anchor="middle">transcribe</text>
  </g>
  <g>
    <rect class="node" x="545" y="493" width="150" height="145"/>
    <text class="ink small" x="620" y="529" text-anchor="middle">Video Generation</text>
    <text class="muted small" x="620" y="562" text-anchor="middle">text/image to video,</text>
    <text class="muted small" x="620" y="589" text-anchor="middle">scene animation</text>
  </g>
  <g>
    <rect class="node" x="725" y="493" width="150" height="145"/>
    <text class="ink small" x="800" y="529" text-anchor="middle">Footage Search</text>
    <text class="muted small" x="800" y="562" text-anchor="middle">find clips, b-roll,</text>
    <text class="muted small" x="800" y="589" text-anchor="middle">stock assets</text>
  </g>
  <g>
    <rect class="node" x="905" y="493" width="150" height="145"/>
    <text class="ink small" x="980" y="529" text-anchor="middle">Format Conversion</text>
    <text class="muted small" x="980" y="562" text-anchor="middle">resize, crop,</text>
    <text class="muted small" x="980" y="589" text-anchor="middle">reframe</text>
  </g>
  <g>
    <rect class="node" x="1085" y="493" width="150" height="145"/>
    <text class="ink small" x="1160" y="529" text-anchor="middle">Custom Node</text>
    <text class="muted small" x="1160" y="562" text-anchor="middle">wrap any tool</text>
    <text class="muted small" x="1160" y="589" text-anchor="middle">as a player</text>
  </g>

  <path class="blueLine" marker-end="url(#arrowBlue)" d="M345 685 L425 685 L505 685 L585 685"/>
  <text class="blue small" x="465" y="722" text-anchor="middle">Pipeline: multi-step players can be chained</text>
  <circle cx="345" cy="685" r="14" fill="#fff" stroke="#111827" stroke-width="2"/>
  <circle cx="425" cy="685" r="14" fill="#fff" stroke="#111827" stroke-width="2"/>
  <circle cx="505" cy="685" r="14" fill="#fff" stroke="#111827" stroke-width="2"/>
  <circle cx="585" cy="685" r="14" fill="#fff" stroke="#111827" stroke-width="2"/>

  <rect class="dash" x="1110" y="492" width="230" height="226" rx="18"/>
  <text class="blue small" x="1225" y="528" text-anchor="middle">Examples of players</text>
  <text class="ink small" x="1138" y="570">- FLUX image gen</text>
  <text class="ink small" x="1138" y="605">- Whisper transcription</text>
  <text class="ink small" x="1138" y="640">- Wan I2V</text>
  <text class="ink small" x="1138" y="675">- Pexels search</text>
  <text class="ink small" x="1138" y="710">- Custom resize node</text>
</svg>
