{
  "id": "builtin.understand",
  "name": "Understand",
  "kind": "built_in",
  "version": "1.0",
  "description": "Dispatch to the audio, visual, or video understanding executors.",
  "runtime": {
    "kind": "command",
    "command": {
      "argv": [
        "{python_exec}",
        "-m",
        "artagents.orchestrators.understand.run",
        "{orchestrator_args}"
      ]
    }
  },
  "child_executors": [
    "builtin.audio_understand",
    "builtin.visual_understand",
    "builtin.video_understand"
  ],
  "child_orchestrators": [],
  "cache": {
    "mode": "none"
  },
  "metadata": {
    "runtime_entrypoint": "main",
    "runtime_file": "run.py",
    "runtime_module": "artagents.orchestrators.understand.run"
  }
}
