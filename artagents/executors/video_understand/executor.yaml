{
  "cache": {
    "mode": "none"
  },
  "command": {
    "argv": [
      "{python_exec}",
      "-m",
      "artagents.executors.video_understand.run"
    ]
  },
  "description": "Inspect synchronized audio/video windows with a video-understanding model.",
  "id": "builtin.video_understand",
  "inputs": [
    {
      "description": "Video to inspect.",
      "name": "video",
      "required": false,
      "type": "file"
    }
  ],
  "isolation": {
    "mode": "subprocess"
  },
  "kind": "built_in",
  "metadata": {
    "launcher": "bin/video_understand.py",
    "runtime_entrypoint": "main",
    "runtime_file": "run.py",
    "runtime_module": "artagents.executors.video_understand.run"
  },
  "name": "Video Understand",
  "version": "1.0"
}
