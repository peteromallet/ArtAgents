{
  "id": "iteration.prepare",
  "name": "Iteration Prepare",
  "kind": "built_in",
  "version": "1.0",
  "description": "Collect thread provenance, compute quality, summarize candidate runs, and emit iteration prepare artifacts.",
  "inputs": [
    {
      "name": "target_run_id",
      "type": "string",
      "required": true,
      "description": "Run id to use as the target/root for iteration video preparation."
    }
  ],
  "outputs": [
    {
      "name": "manifest",
      "type": "file",
      "mode": "create_or_replace",
      "path_template": "{out}/iteration.manifest.json",
      "description": "Prepared iteration manifest for assembly."
    },
    {
      "name": "quality",
      "type": "file",
      "mode": "create_or_replace",
      "path_template": "{out}/iteration.quality.json",
      "description": "OQ-6 quality report for the prepared provenance graph."
    }
  ],
  "command": {
    "argv": [
      "{python_exec}",
      "-m",
      "artagents.executors.iteration_prepare.run",
      "--target-run-id",
      "{target_run_id}",
      "--out",
      "{out}"
    ]
  },
  "cache": {
    "mode": "none"
  },
  "conditions": [
    {
      "kind": "requires_input",
      "input": "target_run_id"
    }
  ],
  "graph": {
    "consumes": [
      "thread_runs",
      "provenance"
    ],
    "provides": [
      "iteration_manifest",
      "iteration_quality"
    ]
  },
  "isolation": {
    "mode": "subprocess",
    "network": false
  },
  "metadata": {
    "runtime_entrypoint": "main",
    "runtime_file": "run.py",
    "runtime_module": "artagents.executors.iteration_prepare.run"
  }
}
