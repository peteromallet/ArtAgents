{
  "id": "builtin.generate_image",
  "name": "Generate Image",
  "kind": "built_in",
  "version": "1.0",
  "description": "Generate image files with OpenAI GPT Image models from a prompt file.",
  "inputs": [
    {
      "name": "prompts_file",
      "type": "file",
      "required": true,
      "description": "Text, JSON, or JSONL prompt list consumed by artagents.executors.generate_image.run."
    }
  ],
  "outputs": [
    {
      "name": "image_manifest",
      "type": "file",
      "mode": "create_or_replace",
      "path_template": "{out}/manifest.json",
      "description": "Manifest of generated images and API usage."
    }
  ],
  "command": {
    "argv": [
      "{python_exec}",
      "-m",
      "artagents.executors.generate_image.run",
      "--prompts-file",
      "{prompts_file}",
      "--out-dir",
      "{out}/images",
      "--manifest",
      "{out}/manifest.json"
    ]
  },
  "cache": {
    "mode": "none"
  },
  "conditions": [
    {
      "kind": "requires_input",
      "input": "prompts_file"
    }
  ],
  "graph": {
    "consumes": [
      "image_prompts"
    ],
    "provides": [
      "generated_images",
      "image_manifest"
    ]
  },
  "isolation": {
    "mode": "subprocess",
    "network": true
  },
  "metadata": {
    "runtime_entrypoint": "main",
    "runtime_file": "run.py",
    "runtime_module": "artagents.executors.generate_image.run",
    "api_provider": "openai",
    "env": [
      "OPENAI_API_KEY"
    ]
  }
}
