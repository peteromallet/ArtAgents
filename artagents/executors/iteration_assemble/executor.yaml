{
  "id": "iteration.assemble",
  "name": "Iteration Assemble",
  "kind": "built_in",
  "version": "1.0",
  "description": "Adapt prepared iteration data into canonical iteration artifacts and render-compatible hype inputs.",
  "inputs": [
    {
      "name": "prepare_dir",
      "type": "directory",
      "required": true,
      "description": "Directory containing iteration.prepare outputs."
    }
  ],
  "outputs": [
    {
      "name": "timeline",
      "type": "file",
      "mode": "create_or_replace",
      "path_template": "{out}/iteration.timeline.json",
      "description": "Canonical iteration timeline."
    },
    {
      "name": "manifest",
      "type": "file",
      "mode": "create_or_replace",
      "path_template": "{out}/iteration.manifest.json",
      "description": "Final iteration manifest."
    },
    {
      "name": "report",
      "type": "file",
      "mode": "create_or_replace",
      "path_template": "{out}/iteration.report.html",
      "description": "Iteration HTML report."
    },
    {
      "name": "quality",
      "type": "file",
      "mode": "create_or_replace",
      "path_template": "{out}/iteration.quality.json",
      "description": "Copied quality report with assembly status."
    },
    {
      "name": "hype_timeline",
      "type": "file",
      "mode": "create_or_replace",
      "path_template": "{out}/hype.timeline.json",
      "description": "Render-compatible hype timeline adapter."
    },
    {
      "name": "hype_assets",
      "type": "file",
      "mode": "create_or_replace",
      "path_template": "{out}/hype.assets.json",
      "description": "Render-compatible hype assets adapter."
    }
  ],
  "command": {
    "argv": [
      "{python_exec}",
      "-m",
      "artagents.executors.iteration_assemble.run",
      "--prepare-dir",
      "{prepare_dir}",
      "--out",
      "{out}"
    ]
  },
  "cache": {
    "mode": "none"
  },
  "conditions": [
    {
      "kind": "requires_input",
      "input": "prepare_dir"
    }
  ],
  "graph": {
    "consumes": [
      "iteration_manifest",
      "iteration_quality"
    ],
    "provides": [
      "iteration_timeline",
      "iteration_report",
      "render_adapter"
    ]
  },
  "isolation": {
    "mode": "subprocess",
    "network": false
  },
  "metadata": {
    "runtime_entrypoint": "main",
    "runtime_file": "run.py",
    "runtime_module": "artagents.executors.iteration_assemble.run"
  }
}
