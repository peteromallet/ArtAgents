{
  "id": "external.fal_foley",
  "name": "fal Hunyuan-Video Foley",
  "kind": "external",
  "version": "0.1.0",
  "description": "Generate Foley audio for one short video clip via fal.ai's hunyuan-video-foley model. Takes a clip + text prompt, returns one audio file matched to the clip's duration.",
  "inputs": [
    {
      "name": "clip",
      "type": "file",
      "required": true,
      "description": "Video clip to score with Foley audio (mp4/mov/webm, <=15s recommended)."
    }
  ],
  "outputs": [
    {
      "name": "audio",
      "type": "file",
      "path_template": "{out}"
    }
  ],
  "command": {
    "argv": [
      "{python_exec}",
      "-m",
      "artagents.packs.external.fal_foley.run"
    ]
  },
  "cache": {
    "mode": "none"
  },
  "isolation": {
    "mode": "subprocess",
    "network": true
  },
  "metadata": {
    "runtime_module": "artagents.packs.external.fal_foley.run",
    "runtime_file": "run.py",
    "runtime_entrypoint": "main",
    "fal_model_id": "fal-ai/hunyuan-video-foley",
    "env": ["FAL_KEY"],
    "pricing": "$0.10 per 10s of input video"
  }
}
