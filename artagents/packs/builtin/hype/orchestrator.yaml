{
  "cache": {
    "mode": "none"
  },
  "child_executors": [
    "builtin.transcribe",
    "builtin.scenes",
    "builtin.quality_zones",
    "builtin.shots",
    "builtin.triage",
    "builtin.scene_describe",
    "builtin.quote_scout",
    "builtin.pool_build",
    "builtin.pool_merge",
    "builtin.arrange",
    "builtin.cut",
    "builtin.refine",
    "builtin.render",
    "builtin.editor_review",
    "builtin.validate"
  ],
  "child_orchestrators": [],
  "description": "Orchestrates the built-in hype editing pipeline.",
  "id": "builtin.hype",
  "kind": "built_in",
  "metadata": {
    "requires_output_path": true,
    "runtime_entrypoint": "main",
    "runtime_file": "run.py",
    "runtime_module": "artagents.packs.builtin.hype.run"
  },
  "name": "Hype Pipeline",
  "runtime": {
    "command": {
      "argv": [
        "{python_exec}",
        "-m",
        "artagents.packs.builtin.hype.run",
        "{orchestrator_args}"
      ]
    },
    "kind": "command"
  },
  "version": "1.0"
}
