{
  "id": "builtin.logo_ideas",
  "name": "Logo Ideas",
  "kind": "built_in",
  "version": "1.0",
  "description": "Generate a grid of distinct logo concepts: Kimi K2 (Fireworks) drafts N prompts, then GPT Image 2 (default) renders them as one composite grid in a single fal call. Pass --provider z-image for per-image renders + a locally-assembled contact sheet.",
  "runtime": {
    "kind": "command",
    "command": {
      "argv": [
        "{python_exec}",
        "-m",
        "artagents.packs.builtin.logo_ideas.run",
        "{orchestrator_args}"
      ]
    }
  },
  "child_executors": [],
  "child_orchestrators": [],
  "cache": {
    "mode": "none"
  },
  "isolation": {
    "mode": "subprocess",
    "network": true
  },
  "metadata": {
    "runtime_module": "artagents.packs.builtin.logo_ideas.run",
    "runtime_file": "run.py",
    "runtime_entrypoint": "main",
    "env": [
      "FIREWORKS_API_KEY",
      "FAL_KEY"
    ]
  }
}
