{
  "id": "builtin.boundary_candidates",
  "name": "Boundary Candidates",
  "kind": "built_in",
  "version": "1.0",
  "description": "Package candidate video frames for visual boundary review.",
  "inputs": [
    {"name": "video", "type": "file", "description": "Source video."},
    {"name": "manifest", "type": "file", "description": "Boundary manifest input."}
  ],
  "outputs": [
    {"name": "boundaries", "type": "file", "path_template": "{out}/boundary_candidates.json"}
  ],
  "command": {
    "argv": ["{python_exec}", "-m", "artagents.packs.builtin.boundary_candidates.run", "--video", "{video}", "--manifest", "{manifest}", "--out", "{out}/boundary_candidates.json"]
  },
  "cache": {"mode": "none"},
  "isolation": {"mode": "subprocess"},
  "metadata": {"runtime_module": "artagents.packs.builtin.boundary_candidates.run", "runtime_file": "run.py"}
}
