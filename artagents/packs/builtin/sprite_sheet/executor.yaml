{
  "id": "builtin.sprite_sheet",
  "name": "Sprite Sheet",
  "kind": "built_in",
  "version": "1.0",
  "description": "Generate, slice, and preview GPT Image sprite sheets.",
  "inputs": [
    {"name": "animation", "type": "string", "description": "Animation to depict across frames."},
    {"name": "subject", "type": "string", "description": "Character or object being animated."}
  ],
  "outputs": [
    {"name": "sprite_manifest", "type": "file", "path_template": "{out}/sprite_manifest.json", "description": "Manifest for generated sprite assets."},
    {"name": "sprite_sheet", "type": "file", "path_template": "{out}/sprite_sheet.png", "description": "Generated sprite atlas."},
    {"name": "sprite_sheet_alpha", "type": "file", "path_template": "{out}/sprite_sheet_alpha.png", "description": "Alpha-processed sprite atlas."},
    {"name": "preview", "type": "file", "path_template": "{out}/sprite_preview.mp4", "description": "MP4 preview of the sliced animation."}
  ],
  "command": {
    "argv": ["{python_exec}", "-m", "artagents.packs.builtin.sprite_sheet.run", "--animation", "{animation}", "--subject", "{subject}", "--out-dir", "{out}"]
  },
  "cache": {"mode": "none"},
  "isolation": {"mode": "subprocess", "network": true, "binaries": ["ffmpeg"]},
  "metadata": {"runtime_module": "artagents.packs.builtin.sprite_sheet.run", "runtime_file": "run.py"}
}
