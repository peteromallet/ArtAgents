{
  "cache": {
    "mode": "none"
  },
  "command": {
    "argv": [
      "{python_exec}",
      "-m",
      "artagents.packs.builtin.inspect_cut.run",
      "{run_dir}"
    ]
  },
  "description": "Inspect a generated cut run directory.",
  "id": "builtin.inspect_cut",
  "inputs": [
    {
      "description": "Cut run directory to inspect.",
      "name": "run_dir",
      "type": "directory"
    }
  ],
  "isolation": {
    "mode": "subprocess"
  },
  "keywords": [
    "cut",
    "inspect",
    "video",
    "timeline",
    "debug",
    "report"
  ],
  "kind": "built_in",
  "metadata": {
    "runtime_file": "run.py",
    "runtime_module": "artagents.packs.builtin.inspect_cut.run"
  },
  "name": "Inspect Cut",
  "short_description": "Inspect a generated cut run directory and report timeline/asset health.",
  "version": "1.0"
}
